<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Capture & Analyzer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-width: 400px;
      max-height: 600px;
      overflow: hidden;
    }
    
    .container {
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    
    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
    }
    
    .stat-label {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn.active {
      background: #4CAF50;
      border-color: #45a049;
    }
    
    .btn.danger {
      background: rgba(244, 67, 54, 0.3);
      border-color: rgba(244, 67, 54, 0.5);
    }
    
    .btn.danger:hover {
      background: rgba(244, 67, 54, 0.5);
    }
    
    .request-list {
      flex: 1;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 10px;
    }
    
    .request-item {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 4px solid transparent;
    }
      
    .request-item:hover {
      background: rgba(255,255,255,0.2);
      transform: translateX(5px);
    }
    
    .request-item.expanded {
      background: rgba(255,255,255,0.15);
    }
    
    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    
    .request-method {
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      background: rgba(0,0,0,0.3);
    }
    
    .request-method.GET { background: #4CAF50; }
    .request-method.POST { background: #2196F3; }
    .request-method.PUT { background: #FF9800; }
    .request-method.DELETE { background: #f44336; }
    .request-method.PATCH { background: #9C27B0; }
    
    .request-url {
      font-size: 12px;
      word-break: break-all;
      opacity: 0.9;
    }
    
    .request-meta {
      display: flex;
      gap: 10px;
      font-size: 11px;
      opacity: 0.7;
      margin-top: 5px;
    }
    
    .request-types {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    
    .api-type {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .api-type.restful { background: rgba(76, 175, 80, 0.3); }
    .api-type.data { background: rgba(33, 150, 243, 0.3); }
    .api-type.file { background: rgba(255, 152, 0, 0.3); }
    .api-type.analytics { background: rgba(156, 39, 176, 0.3); }
    .api-type.search { background: rgba(0, 150, 136, 0.3); }
    .api-type.thirdparty { background: rgba(233, 30, 99, 0.3); }
    .api-type.graphql { background: rgba(229, 45, 76, 0.3); }
    
    .request-details {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    
    .request-details.show {
      display: block;
    }
    
    .detail-row {
      margin-bottom: 8px;
    }
    
    .detail-label {
      font-weight: bold;
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 2px;
    }
    
    .detail-value {
      font-size: 12px;
      background: rgba(0,0,0,0.2);
      padding: 5px 8px;
      border-radius: 4px;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }
    
    .search-bar {
      margin-bottom: 15px;
    }
    
    .search-input {
      width: 100%;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }
    
    .search-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    
    .search-input:focus {
      outline: none;
      background: rgba(255,255,255,0.3);
    }
    
    .filter-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    
    .filter-tab {
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 15px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .filter-tab:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .filter-tab.active {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.7;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
    }
    
    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #4CAF50;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translate(-50%, 100%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 API Capture</h1>
      <p>自动捕获和标注网络接口</p>
    </div>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="total-requests">0</div>
        <div class="stat-label">总请求数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="unique-domains">0</div>
        <div class="stat-label">独立域名</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="api-count">0</div>
        <div class="stat-label">API接口</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="btn active" id="toggle-capture">启用捕获</button>
      <button class="btn" id="refresh">刷新</button>
      <button class="btn danger" id="clear-all">清空</button>
    </div>
    
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="搜索URL或接口类型...">
    </div>
    
    <div class="filter-tabs">
      <div class="filter-tab active" data-filter="all">全部</div>
      <div class="filter-tab" data-filter="restful">RESTful</div>
      <div class="filter-tab" data-filter="data">数据接口</div>
      <div class="filter-tab" data-filter="file">文件接口</div>
      <div class="filter-tab" data-filter="thirdparty">第三方</div>
    </div>
    
    <div class="request-list" id="request-list">
      <div class="loading">
        <div class="spinner"></div>
        <div>加载中...</div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
